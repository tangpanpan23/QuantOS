# Redis 安全配置文件

# 网络配置
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 300

# 安全配置
# requirepass your_secure_password_here
protected-mode yes

# 内存管理
maxmemory 128mb
maxmemory-policy allkeys-lru

# 持久化配置
save 900 1
save 300 10
save 60 10000

# 日志配置
loglevel notice
logfile /data/redis.log

# 快照配置
dbfilename dump.rdb
dir /data

# AOF 配置 (可选，用于更高可靠性)
appendonly no
appendfilename "appendonly.aof"
appendfsync everysec

# 连接限制
maxclients 10000

# 禁用危险命令
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command SHUTDOWN SHUTDOWN_REDIS
rename-command CONFIG CONFIG_REDIS

# 慢日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 其他安全设置
tcp-backlog 511
databases 16

# 禁用THP (Transparent Huge Pages) 以提高性能
# echo never > /sys/kernel/mm/transparent_hugepage/enabled
