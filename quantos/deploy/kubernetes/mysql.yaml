# ===========================================
# QuantSaaS MySQL 安全部署配置
# ===========================================

# MySQL 初始化配置 - 使用环境变量而不是硬编码
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-config
  namespace: quantos
  labels:
    app: mysql
    component: database
data:
  init.sql: |
    -- QuantSaaS 数据库安全初始化脚本
    CREATE DATABASE IF NOT EXISTS quantos CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

    -- 创建应用用户，使用环境变量中的密码
    CREATE USER IF NOT EXISTS 'quantos'@'%' IDENTIFIED BY '${MYSQL_USER_PASSWORD}';
    GRANT SELECT, INSERT, UPDATE, DELETE, CREATE, DROP, INDEX, ALTER ON quantos.* TO 'quantos'@'%';

    -- 创建只读用户（用于报表和分析）
    CREATE USER IF NOT EXISTS 'quantos_readonly'@'%' IDENTIFIED BY '${MYSQL_READONLY_PASSWORD}';
    GRANT SELECT ON quantos.* TO 'quantos_readonly'@'%';

    -- 设置时区
    SET time_zone = '+08:00';

    -- 创建审计表
    USE quantos;
    CREATE TABLE IF NOT EXISTS audit_log (
        id BIGINT UNSIGNED NOT NULL AUTO_INCREMENT,
        table_name VARCHAR(100) NOT NULL,
        operation VARCHAR(10) NOT NULL,
        old_values JSON,
        new_values JSON,
        user_id BIGINT UNSIGNED,
        ip_address VARCHAR(45),
        user_agent TEXT,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        PRIMARY KEY (id),
        INDEX idx_table_operation (table_name, operation),
        INDEX idx_created_at (created_at)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;

    FLUSH PRIVILEGES;

---
# MySQL Secret - 存储所有敏感信息
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: quantos
  labels:
    app: mysql
    component: database
  annotations:
    # 标记为敏感信息，不应被意外暴露
    security.alpha.kubernetes.io/secret-type: "database"
type: Opaque
data:
  # 这些值应该通过外部工具生成，而不是硬编码
  # 使用: echo -n 'your_secure_password' | base64
  # 或者使用外部密钥管理系统
  mysql-root-password: ""  # 应从外部配置管理工具获取
  mysql-user-password: ""  # 应用用户密码
  mysql-readonly-password: ""  # 只读用户密码

---
# MySQL ConfigMap - 安全配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: quantos
  labels:
    app: mysql
    component: database
data:
  my.cnf: |
    [mysqld]
    # 基础配置
    bind-address = 0.0.0.0
    port = 3306
    socket = /tmp/mysql.sock

    # 字符集配置
    character-set-server = utf8mb4
    collation-server = utf8mb4_unicode_ci
    init_connect = 'SET NAMES utf8mb4'

    # 安全配置
    skip-name-resolve
    skip-external-locking
    skip-symbolic-links

    # 性能配置
    innodb_buffer_pool_size = 128M
    innodb_log_file_size = 32M
    max_connections = 100
    wait_timeout = 28800
    interactive_timeout = 28800

    # 日志配置
    general_log = 0
    slow_query_log = 1
    slow_query_log_file = /var/log/mysql/mysql-slow.log
    long_query_time = 2

    # 二进制日志 (用于备份和复制)
    log_bin = /var/lib/mysql/mysql-bin
    binlog_format = ROW
    expire_logs_days = 7
    max_binlog_size = 100M

    # InnoDB 配置
    innodb_file_per_table = 1
    innodb_flush_method = O_DIRECT
    innodb_log_buffer_size = 16M

    # 连接配置
    max_allowed_packet = 64M
    net_buffer_length = 16K

    # SQL模式 - 严格模式增强安全性
    sql_mode = STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION

    [mysql]
    default-character-set = utf8mb4

    [client]
    default-character-set = utf8mb4

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: quantos
  labels:
    app: mysql
    version: "8.0"
    component: database
spec:
  replicas: 1
  strategy:
    type: Recreate  # MySQL 不支持滚动更新
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
        version: "8.0"
        component: database
    spec:
      # 安全上下文
      securityContext:
        runAsUser: 999  # MySQL 用户
        runAsGroup: 999
        fsGroup: 999
        # 防止容器以特权模式运行
        runAsNonRoot: true
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
          name: mysql
          protocol: TCP
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-root-password
        - name: MYSQL_DATABASE
          value: "quantos"
        - name: MYSQL_USER
          value: "quantos"
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-user-password
        # 初始化脚本中使用的环境变量
        - name: MYSQL_USER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-user-password
        - name: MYSQL_READONLY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-readonly-password
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
        - name: mysql-init
          mountPath: /docker-entrypoint-initdb.d
        - name: mysql-config
          mountPath: /etc/mysql/conf.d
        - name: mysql-logs
          mountPath: /var/log/mysql
        # 资源限制
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        # 健康检查
        livenessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - --silent
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - --silent
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
      - name: mysql-data
        persistentVolumeClaim:
          claimName: mysql-pvc
      - name: mysql-init
        configMap:
          name: mysql-init-config
      - name: mysql-config
        configMap:
          name: mysql-config
      - name: mysql-logs
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: quantos
  labels:
    app: mysql
    component: database
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
    name: mysql
  # 不使用Headless Service，除非需要状态检查
  type: ClusterIP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: quantos
  labels:
    app: mysql
    component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # 启用存储类以支持动态配置
  storageClassName: standard
