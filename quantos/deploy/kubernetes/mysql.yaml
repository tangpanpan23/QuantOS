apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-config
  namespace: quantos
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS quantos CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE USER IF NOT EXISTS 'quantos'@'%' IDENTIFIED BY 'quantos123';
    GRANT ALL PRIVILEGES ON quantos.* TO 'quantos'@'%';
    FLUSH PRIVILEGES;
    SET time_zone = '+08:00';

---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: quantos
type: Opaque
data:
  # base64 encoded: quantos123
  mysql-root-password: cXVhbnRvczEyMw==
  mysql-user: cXVhbnRvczEyMw==

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: quantos
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-root-password
        - name: MYSQL_DATABASE
          value: "quantos"
        - name: MYSQL_USER
          value: "quantos"
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: mysql-user
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
        - name: mysql-init
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - mysqladmin
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - mysqladmin
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: mysql-data
        persistentVolumeClaim:
          claimName: mysql-pvc
      - name: mysql-init
        configMap:
          name: mysql-init-config

---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: quantos
  labels:
    app: mysql
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
  clusterIP: None  # 使用Headless Service

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: quantos
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
